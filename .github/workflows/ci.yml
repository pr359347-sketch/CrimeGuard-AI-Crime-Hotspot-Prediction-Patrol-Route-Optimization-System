name: CI

on:
  push:
    branches: [ main, reorganize-structure ]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          if [ -f 05.src/requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r 05.src/requirements.txt || true
          else
            echo "No requirements file found at 05.src/requirements.txt"
          fi
      - name: Quick smoke test
        run: |
          python -c "import sys; print('smoke-test ok', sys.version)"
